site_name: Coding Agent Model and Memory Roadmap
site_description: 模型后训练、Coding Agent Memory、论文阅读和工程实验的长期研究系统
site_url: https://JustinMoFeng.github.io/coding-agent-model-memory-roadmap/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

docs_dir: content

nav:
  - 首页: index.md
  - Overview:
      - 总览: overview.md
      - Agent Training: agent-training-overview.md
      - Memory: memory-overview.md
      - 科研提升: research-skill-overview.md
  - 周计划:
      - 2026-06-22 至 2026-06-28:
          - 本周计划: weeks/2026-06-22/index.md
          - 2026-06-22: weeks/2026-06-22/2026-06-22.md
          - 2026-06-23: weeks/2026-06-22/2026-06-23.md
          - 2026-06-24: weeks/2026-06-22/2026-06-24.md
          - 2026-06-25: weeks/2026-06-22/2026-06-25.md
          - 2026-06-26: weeks/2026-06-22/2026-06-26.md
          - 2026-06-27: weeks/2026-06-22/2026-06-27.md
          - 2026-06-28: weeks/2026-06-22/2026-06-28.md
  - 专题:
      - Multica Memory 调研: topics/multica-memory-reading-guide.md
  - 项目:
      - Agent Training Lab: projects/agent-training-lab.md
      - Coding Agent Memory Lab: projects/coding-agent-memory-lab.md
  - 模板:
      - 周计划模板: reference/templates/week-plan-template.md
      - 每日进度模板: reference/templates/daily-log-template.md
      - 论文笔记模板: reference/templates/paper-note.md
      - 实验记录模板: reference/templates/experiment-log.md
      - 周复盘模板: reference/templates/weekly-review.md
